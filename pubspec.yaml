name: mata_angin
description: "Mata Angin Management App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  pdf: ^3.11.1
  firebase_storage: ^13.4.2
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  path_provider: ^2.1.6
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "yes"
  ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
